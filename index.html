<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunah / Jinny AI Motion Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --plum-noir: #140B17;
            --plum-ink: #231125;
            --aubergine: #38213C;
            --cool-blue: #7AA7B7;
            --blue-ice: #C5DFE6;
            --jade: #37A78D;
            --jade-deep: #0D655C;
            --wasabi: #C4D64D;
            --persimmon: #F26E3B;
            --rose: #F4A7B9;
            --amber: #F3B84A;
            --porcelain: #F4EFE5;
            --mist: rgba(244, 239, 229, 0.76);
            --muted: rgba(244, 239, 229, 0.62);
            --line: rgba(197, 223, 230, 0.26);
            --panel: rgba(22, 12, 24, 0.78);
            --panel-strong: rgba(244, 239, 229, 0.09);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);

            --font-display: 'Cormorant Garamond', 'Noto Serif SC', Georgia, serif;
            --font-ui: 'Bricolage Grotesque', 'Noto Serif SC', system-ui, -apple-system, sans-serif;

            --page-pad: clamp(16px, 3.4vw, 44px);
            --radius-sm: 6px;
            --radius-md: 8px;
            --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--plum-noir);
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            background-color: var(--plum-noir);
            background:
                linear-gradient(135deg, rgba(20, 11, 23, 0.96), rgba(35, 17, 37, 0.98) 48%, rgba(13, 101, 92, 0.82)),
                repeating-linear-gradient(90deg, rgba(197, 223, 230, 0.045) 0 1px, transparent 1px 42px),
                repeating-linear-gradient(0deg, rgba(196, 214, 77, 0.035) 0 1px, transparent 1px 34px),
                var(--plum-noir);
            color: var(--porcelain);
            font-family: var(--font-ui);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            background:
                linear-gradient(115deg, transparent 0 17%, rgba(122, 167, 183, 0.12) 17.1% 17.6%, transparent 17.7% 52%, rgba(242, 110, 59, 0.12) 52.1% 52.45%, transparent 52.6%),
                linear-gradient(24deg, transparent 0 65%, rgba(196, 214, 77, 0.08) 65.1% 65.7%, transparent 65.8%);
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.3;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
            background-size: 100% 7px, 9px 100%;
            mix-blend-mode: screen;
        }

        .stage-ambient {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .stage-ambient::before,
        .stage-ambient::after {
            content: '';
            position: absolute;
            left: -12vw;
            right: -12vw;
            height: 112px;
            border-block: 1px solid rgba(197, 223, 230, 0.12);
            background:
                repeating-linear-gradient(90deg, transparent 0 18px, rgba(244, 239, 229, 0.08) 18px 24px, transparent 24px 46px),
                linear-gradient(90deg, rgba(242, 110, 59, 0.08), rgba(122, 167, 183, 0.12), rgba(196, 214, 77, 0.08));
            opacity: 0.42;
            transform: rotate(-9deg);
        }

        .stage-ambient::before {
            top: 118px;
            animation: filmDrift 24s linear infinite;
        }

        .stage-ambient::after {
            bottom: 14vh;
            opacity: 0.26;
            transform: rotate(7deg);
            animation: filmDriftReverse 30s linear infinite;
        }

        button,
        video {
            font: inherit;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            letter-spacing: 0;
        }

        .app-shell {
            width: min(1520px, 100%);
            margin: 0 auto;
            padding: clamp(18px, 3vw, 34px) var(--page-pad) 56px;
        }

        header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 480px);
            gap: clamp(18px, 4vw, 54px);
            align-items: center;
            min-height: clamp(440px, 72vh, 690px);
            padding: clamp(18px, 3vw, 38px) 0 clamp(18px, 3vw, 34px);
            border-bottom: 1px solid var(--line);
            position: relative;
        }

        header > div:first-child {
            position: relative;
            z-index: 2;
            min-width: 0;
        }

        header::before,
        header::after {
            content: '';
            position: absolute;
            pointer-events: none;
        }

        header::before {
            left: 0;
            bottom: -1px;
            width: min(420px, 68vw);
            height: 1px;
            background: linear-gradient(90deg, var(--wasabi), var(--cool-blue), transparent);
        }

        header::after {
            right: 0;
            top: 14px;
            width: 84px;
            height: 84px;
            border: 1px solid rgba(197, 223, 230, 0.3);
            border-left-color: var(--persimmon);
            transform: rotate(45deg);
            opacity: 0.72;
        }

        .eyebrow {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin: 0 0 14px;
            color: var(--blue-ice);
            font-size: clamp(0.72rem, 1.2vw, 0.82rem);
            font-weight: 700;
            text-transform: uppercase;
        }

        .eyebrow span {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 5px 9px;
            border: 1px solid rgba(197, 223, 230, 0.28);
            border-radius: var(--radius-sm);
            background: rgba(244, 239, 229, 0.06);
            letter-spacing: 0;
        }

        .eyebrow span:first-child {
            color: var(--plum-noir);
            background: var(--wasabi);
            border-color: transparent;
            box-shadow: 4px 4px 0 rgba(242, 110, 59, 0.72);
        }

        header h1 {
            max-width: 980px;
            margin: 0;
            color: var(--porcelain);
            font-size: clamp(3.05rem, 7.4vw, 7.4rem);
            font-weight: 600;
            line-height: 0.86;
            text-wrap: balance;
            text-shadow: 2px 0 rgba(122, 167, 183, 0.45), -2px 1px rgba(242, 110, 59, 0.42);
        }

        .hero-wordmark {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            align-items: end;
            max-width: 660px;
            margin-top: 18px;
            color: rgba(244, 239, 229, 0.45);
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .hero-wordmark::before {
            content: '';
            width: min(44vw, 320px);
            height: 10px;
            border-radius: 999px;
            background:
                linear-gradient(90deg, var(--cool-blue) 0 18%, var(--persimmon) 18% 42%, var(--wasabi) 42% 68%, var(--rose) 68% 100%);
            box-shadow: 0 0 24px rgba(196, 214, 77, 0.22);
        }

        header p {
            max-width: 620px;
            margin: clamp(12px, 2vw, 18px) 0 0;
            color: var(--mist);
            font-size: clamp(0.96rem, 1.45vw, 1.14rem);
            overflow-wrap: anywhere;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 22px;
        }

        .hero-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0.58rem 0.9rem;
            border: 1px solid rgba(197, 223, 230, 0.28);
            border-radius: var(--radius-sm);
            color: var(--porcelain);
            background: rgba(244, 239, 229, 0.06);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: transform 0.24s var(--ease), background 0.24s ease, color 0.24s ease;
        }

        .hero-link.primary {
            color: var(--plum-noir);
            border-color: var(--wasabi);
            background: var(--wasabi);
            box-shadow: 5px 5px 0 rgba(242, 110, 59, 0.62);
        }

        .hero-link:hover {
            transform: translateY(-2px);
        }

        .recruiter-panel {
            position: relative;
            min-width: 0;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background:
                linear-gradient(145deg, rgba(244, 239, 229, 0.12), rgba(244, 239, 229, 0.04)),
                rgba(20, 11, 23, 0.54);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            overflow: hidden;
        }

        .recruiter-panel::before {
            content: '01';
            position: absolute;
            top: -10px;
            right: 12px;
            color: rgba(196, 214, 77, 0.2);
            font-family: var(--font-display);
            font-size: 5rem;
            line-height: 1;
            font-style: italic;
        }

        .player-frame {
            position: relative;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            border: 1px solid rgba(197, 223, 230, 0.22);
            border-radius: var(--radius-sm);
            background:
                repeating-linear-gradient(90deg, rgba(244, 239, 229, 0.08) 0 1px, transparent 1px 14px),
                #050508;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
        }

        .player-frame::before {
            content: 'NOW PLAYING';
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 4;
            padding: 5px 8px;
            border-radius: 999px;
            color: var(--plum-noir);
            background: rgba(196, 214, 77, 0.92);
            font-size: 0.64rem;
            font-weight: 900;
            letter-spacing: 0.04em;
        }

        .player-frame video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .player-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(20, 11, 23, 0.02), rgba(20, 11, 23, 0.44));
            opacity: 0.55;
        }

        .featured-play {
            position: absolute;
            left: 16px;
            bottom: 16px;
            z-index: 3;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 46px;
            padding: 0.62rem 0.86rem;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: var(--radius-sm);
            color: var(--plum-noir);
            background: linear-gradient(145deg, rgba(244, 239, 229, 0.96), rgba(197, 223, 230, 0.78));
            box-shadow: 5px 5px 0 rgba(242, 110, 59, 0.74), 0 14px 34px rgba(0, 0, 0, 0.32);
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 800;
            transition: opacity 0.22s ease, transform 0.22s var(--ease);
        }

        .featured-play::before {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 13px;
            border-color: transparent transparent transparent var(--plum-noir);
        }

        .featured-play:hover {
            transform: translateY(-2px);
        }

        .featured-play.is-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
        }

        .featured-copy {
            position: relative;
            z-index: 2;
            padding-top: 15px;
        }

        .section-label {
            display: inline-block;
            margin-bottom: 7px;
            color: var(--wasabi);
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .recruiter-panel h2 {
            margin: 0 0 8px;
            color: var(--blue-ice);
            font-size: clamp(1.36rem, 3vw, 2rem);
            font-weight: 600;
            line-height: 1.04;
        }

        .recruiter-panel p {
            margin: 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .featured-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-top: 12px;
        }

        .featured-meta span {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 4px 8px;
            border: 1px solid rgba(197, 223, 230, 0.22);
            border-radius: 999px;
            color: var(--blue-ice);
            background: rgba(197, 223, 230, 0.1);
            font-size: 0.74rem;
            font-weight: 700;
        }

        .signal-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 18px;
        }

        .signal {
            min-width: 0;
            padding: 10px 8px;
            border: 1px solid rgba(197, 223, 230, 0.18);
            border-radius: var(--radius-sm);
            background: rgba(0, 0, 0, 0.14);
        }

        .signal strong,
        .signal span {
            display: block;
        }

        .signal strong {
            color: var(--porcelain);
            font-size: 1.1rem;
        }

        .signal span {
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
        }

        main {
            padding-top: 18px;
        }

        .reel-section {
            margin: 0 0 18px;
            padding: 16px 0 18px;
            border-bottom: 1px solid rgba(197, 223, 230, 0.16);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            margin-bottom: 12px;
        }

        .section-head h2 {
            margin: 0;
            color: var(--porcelain);
            font-size: clamp(1.65rem, 3.4vw, 3rem);
            line-height: 0.96;
            font-weight: 600;
        }

        .section-head p {
            max-width: 420px;
            margin: 0;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: right;
        }

        .showreel-strip {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(168px, 218px);
            gap: 12px;
            overflow-x: auto;
            overscroll-behavior-inline: contain;
            padding: 3px 2px 12px;
            scroll-snap-type: x proximity;
            scrollbar-color: rgba(196, 214, 77, 0.7) rgba(244, 239, 229, 0.08);
        }

        .reel-tile {
            position: relative;
            min-height: 146px;
            overflow: hidden;
            border: 1px solid rgba(197, 223, 230, 0.22);
            border-radius: var(--radius-md);
            background: rgba(244, 239, 229, 0.06);
            cursor: pointer;
            scroll-snap-align: start;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
            transition: transform 0.26s var(--ease), border-color 0.26s ease;
        }

        .reel-tile:hover {
            transform: translateY(-4px) rotate(-1deg);
            border-color: rgba(196, 214, 77, 0.58);
        }

        .reel-tile img {
            width: 100%;
            height: 100%;
            min-height: 146px;
            display: block;
            object-fit: cover;
            filter: saturate(1.1) contrast(1.05);
        }

        .reel-tile::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 20%, rgba(20, 11, 23, 0.86));
            pointer-events: none;
        }

        .reel-tile span {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 9px;
            color: var(--porcelain);
            font-family: var(--font-display);
            font-size: 1.08rem;
            font-weight: 600;
            line-height: 1;
        }

        .reel-index {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 2;
            padding: 4px 7px;
            border-radius: 999px;
            color: var(--plum-noir);
            background: var(--porcelain);
            font-size: 0.64rem;
            font-weight: 900;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 40;
            margin: 0 calc(var(--page-pad) * -1) 18px;
            padding: 13px var(--page-pad);
            border-bottom: 1px solid rgba(197, 223, 230, 0.16);
            background: rgba(20, 11, 23, 0.78);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .filter-btn {
            max-width: 100%;
            min-height: 40px;
            background: rgba(244, 239, 229, 0.06);
            border: 1px solid rgba(197, 223, 230, 0.24);
            color: var(--mist);
            padding: 0.5rem 0.88rem;
            border-radius: var(--radius-sm);
            font-family: var(--font-ui);
            font-size: 0.88rem;
            font-weight: 650;
            letter-spacing: 0;
            cursor: pointer;
            transition: transform 0.24s var(--ease), border-color 0.24s ease, background-color 0.24s ease, color 0.24s ease;
            white-space: normal;
            overflow-wrap: anywhere;
            box-shadow: inset 0 -3px 0 rgba(255, 255, 255, 0.04);
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--wasabi);
            border-color: var(--wasabi);
            color: var(--plum-noir);
            transform: translateY(-2px);
            box-shadow: 5px 5px 0 rgba(242, 110, 59, 0.58);
        }

        .portfolio-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 272px), 1fr));
            gap: clamp(14px, 2vw, 22px);
            align-items: start;
            margin: 0;
        }

        .video-card {
            position: relative;
            min-width: 0;
            background:
                linear-gradient(180deg, rgba(244, 239, 229, 0.1), rgba(244, 239, 229, 0.045)),
                var(--panel);
            border: 1px solid rgba(197, 223, 230, 0.22);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 16px 46px rgba(0, 0, 0, 0.24);
            cursor: pointer;
            transform: translateY(0);
            transition: transform 0.42s var(--ease), box-shadow 0.42s ease, border-color 0.42s ease;
            isolation: isolate;
            animation: cardIn 0.62s var(--ease) both;
        }

        .video-card:nth-child(5n + 1) { --card-accent: var(--wasabi); }
        .video-card:nth-child(5n + 2) { --card-accent: var(--cool-blue); }
        .video-card:nth-child(5n + 3) { --card-accent: var(--persimmon); }
        .video-card:nth-child(5n + 4) { --card-accent: var(--rose); }
        .video-card:nth-child(5n + 5) { --card-accent: var(--amber); }

        .video-card::before,
        .video-card::after {
            content: '';
            position: absolute;
            pointer-events: none;
            z-index: 2;
        }

        .video-card::before {
            inset: 9px;
            border: 1px solid rgba(196, 214, 77, 0.14);
            border-radius: var(--radius-sm);
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 0.32s ease, transform 0.32s var(--ease);
        }

        .video-card::after {
            top: 0;
            right: 24px;
            width: 42px;
            height: 7px;
            background: var(--card-accent, var(--persimmon));
            box-shadow: -18px 0 0 var(--cool-blue), 18px 0 0 var(--wasabi);
            opacity: 0.82;
        }

        .video-card:hover {
            transform: translateY(-7px) rotate(-0.45deg);
            border-color: rgba(196, 214, 77, 0.55);
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.38);
        }

        .video-card.is-cued {
            border-color: var(--card-accent, var(--wasabi));
            box-shadow: 0 0 0 2px rgba(244, 239, 229, 0.22), 0 28px 70px rgba(0, 0, 0, 0.38);
        }

        .video-card:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            background:
                repeating-linear-gradient(90deg, rgba(244, 239, 229, 0.07) 0 1px, transparent 1px 13px),
                linear-gradient(145deg, rgba(122, 167, 183, 0.2), rgba(20, 11, 23, 0.88));
            overflow: hidden;
        }

        .card-number {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 4;
            min-width: 34px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(244, 239, 229, 0.28);
            border-radius: 999px;
            color: var(--plum-noir);
            background: var(--card-accent, var(--porcelain));
            font-size: 0.68rem;
            font-weight: 900;
        }

        .video-wrapper:fullscreen,
        .video-wrapper:-webkit-full-screen {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-wrapper:fullscreen video,
        .video-wrapper:-webkit-full-screen video {
            width: 100%;
            height: 100%;
            max-height: 100vh;
            object-fit: contain;
        }

        .video-wrapper:fullscreen .fullscreen-btn,
        .video-wrapper:-webkit-full-screen .fullscreen-btn {
            opacity: 1;
            position: fixed;
            top: 20px;
            right: 20px;
            bottom: auto;
            width: 44px;
            height: 44px;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50%;
            z-index: 200;
        }
        .video-wrapper:fullscreen .fullscreen-btn:hover,
        .video-wrapper:-webkit-full-screen .fullscreen-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .click-catcher {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80%;
            z-index: 5;
            cursor: pointer;
        }
        .video-wrapper:fullscreen .click-catcher,
        .video-wrapper:-webkit-full-screen .click-catcher {
            display: block;
            position: fixed;
            height: 80vh;
        }

        video,
        .cover-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            background: #050508;
            filter: saturate(1.06) contrast(1.04);
            transition: filter 0.32s ease, transform 0.52s var(--ease);
        }

        .video-card:hover video,
        .video-card:hover .cover-image {
            transform: scale(1.025);
            filter: saturate(1.18) contrast(1.07);
        }

        .media-status {
            position: absolute;
            left: 12px;
            bottom: 12px;
            z-index: 4;
            max-width: calc(100% - 68px);
            padding: 6px 9px;
            border: 1px solid rgba(244, 239, 229, 0.2);
            border-radius: 999px;
            background: rgba(20, 11, 23, 0.62);
            color: rgba(244, 239, 229, 0.78);
            font-size: 0.68rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .media-status::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            margin-right: 6px;
            border-radius: 50%;
            background: var(--card-accent, var(--jade));
            box-shadow: 0 0 12px var(--card-accent, var(--jade));
            vertical-align: 1px;
        }

        .video-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(20, 11, 23, 0) 48%, rgba(20, 11, 23, 0.54) 100%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.055) 0 1px, transparent 1px 6px);
            opacity: 0.38;
            mix-blend-mode: screen;
        }

        .video-card.playing .video-wrapper::before {
            opacity: 0.12;
        }

        .play-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            width: 58px;
            height: 58px;
            background:
                linear-gradient(145deg, rgba(244, 239, 229, 0.94), rgba(197, 223, 230, 0.72));
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
            box-shadow: 0 14px 38px rgba(0, 0, 0, 0.28), 5px 5px 0 rgba(242, 110, 59, 0.72);
            transition: opacity 0.3s ease, transform 0.3s var(--ease);
            pointer-events: none;
        }
        
        .video-card:hover .play-indicator {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        .video-card.playing .play-indicator {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.86);
        }

        .video-card.image-only {
            cursor: default;
        }

        .video-card.image-only .play-indicator,
        .video-card.image-only .fullscreen-btn {
            display: none;
        }

        .play-indicator::after {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 9px 0 9px 15px;
            border-color: transparent transparent transparent var(--plum-noir);
            margin-left: 4px;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background-color: rgba(20, 11, 23, 0.68);
            color: var(--porcelain);
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, background-color 0.2s ease, transform 0.2s var(--ease);
            z-index: 11;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .video-card:hover .fullscreen-btn,
        .video-card.playing .fullscreen-btn {
            opacity: 1;
        }

        .fullscreen-btn:hover {
            background-color: rgba(242, 110, 59, 0.88);
            transform: scale(1.05);
        }

        .card-content {
            position: relative;
            z-index: 4;
            padding: 14px 14px 16px;
        }

        .card-content::before {
            content: '';
            display: block;
            width: 44px;
            height: 3px;
            margin: 0 0 12px;
            border-radius: 999px;
            background: var(--card-accent, var(--wasabi));
        }

        .card-title {
            color: var(--porcelain);
            font-family: var(--font-display);
            font-size: clamp(1.18rem, 2vw, 1.45rem);
            font-weight: 600;
            line-height: 1.05;
            margin: 0 0 12px;
            overflow-wrap: anywhere;
        }

        .metadata {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 11px;
            text-transform: uppercase;
        }

        .metadata span {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .metadata span:first-child::before {
            content: '';
            display: inline-block;
            width: 7px;
            height: 7px;
            margin-right: 7px;
            border-radius: 50%;
            background: var(--jade);
            box-shadow: 0 0 12px var(--jade);
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .card-desc {
            margin: 12px 0 0;
            color: rgba(244, 239, 229, 0.62);
            font-size: 0.82rem;
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tag {
            max-width: 100%;
            background: rgba(197, 223, 230, 0.13);
            border: 1px solid rgba(197, 223, 230, 0.18);
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 0.74rem;
            font-weight: 650;
            color: var(--blue-ice);
            overflow-wrap: anywhere;
            box-shadow: inset 0 -2px 5px rgba(255, 255, 255, 0.06);
        }

        .tag.tool-tag {
            background: rgba(196, 214, 77, 0.18);
            border-color: rgba(196, 214, 77, 0.38);
            color: var(--wasabi);
        }

        .status-card {
            grid-column: 1 / -1;
            display: grid;
            place-items: center;
            min-height: 260px;
            padding: 30px;
            border: 1px solid rgba(197, 223, 230, 0.24);
            border-radius: var(--radius-md);
            background:
                linear-gradient(135deg, rgba(244, 239, 229, 0.1), rgba(55, 167, 141, 0.09)),
                rgba(20, 11, 23, 0.58);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .status-card strong {
            display: block;
            margin-bottom: 8px;
            color: var(--porcelain);
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 5vw, 3rem);
            font-weight: 600;
            line-height: 1;
        }

        .status-card span {
            display: block;
            color: var(--muted);
            font-size: 0.96rem;
        }

        .loading-shimmer {
            position: relative;
            overflow: hidden;
        }

        .loading-shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(100deg, transparent 0 28%, rgba(244, 239, 229, 0.18) 44%, transparent 60% 100%);
            transform: translateX(-100%);
            animation: shimmer 1.9s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes filmDrift {
            from { background-position: 0 0, 0 0; }
            to { background-position: 320px 0, 0 0; }
        }

        @keyframes filmDriftReverse {
            from { background-position: 320px 0, 0 0; }
            to { background-position: 0 0, 0 0; }
        }

        @media (max-width: 860px) {
            header {
                grid-template-columns: 1fr;
                min-height: 0;
                align-items: start;
            }

            header::after {
                width: 54px;
                height: 54px;
                opacity: 0.45;
            }

            .recruiter-panel {
                padding: 14px;
            }
        }

        @media (max-width: 620px) {
            .app-shell {
                width: 100vw;
                max-width: 100vw;
                overflow-x: hidden;
                padding-left: 17px;
                padding-right: 17px;
                padding-bottom: 34px;
            }

            header,
            header > div:first-child,
            header p,
            header h1,
            .hero-actions,
            .recruiter-panel {
                width: 100%;
                max-width: 340px;
            }

            header p {
                max-width: 320px;
            }

            header h1 {
                font-size: clamp(2.48rem, 14vw, 4.1rem);
            }

            header p {
                font-size: 0.94rem;
            }

            .hero-actions {
                display: grid;
                grid-template-columns: 1fr;
                margin-top: 16px;
            }

            .hero-link {
                min-width: 0;
                width: 100%;
            }

            .eyebrow {
                display: grid;
                grid-template-columns: 1fr;
            }

            .eyebrow span {
                max-width: 100%;
                width: max-content;
                justify-self: start;
                overflow-wrap: anywhere;
                font-size: 0.68rem;
            }

            .eyebrow span:nth-child(3) {
                grid-column: auto;
            }

            header p,
            .recruiter-panel {
                max-width: 100%;
            }

            .player-frame {
                aspect-ratio: 4 / 5;
            }

            .filters {
                gap: 8px;
                padding-top: 10px;
                padding-bottom: 10px;
            }

            .filter-btn {
                flex: 1 1 auto;
                min-width: min(148px, 100%);
                padding-inline: 0.72rem;
                font-size: 0.84rem;
            }

            .signal-row {
                grid-template-columns: 1fr;
            }

            .section-head {
                display: block;
            }

            .section-head p {
                margin-top: 8px;
                text-align: left;
            }

            .showreel-strip {
                grid-auto-columns: minmax(152px, 72vw);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }

    </style>
</head>
<body>
    <div class="stage-ambient" aria-hidden="true"></div>
    <div class="app-shell">
        <header>
            <div>
                <div class="eyebrow">
                    <span>Lunah / Jinny</span>
                    <span>AI Video Portfolio</span>
                    <span>Recruiter Preview</span>
                </div>
                <h1>AI Video Portfolio</h1>
                <p>这里整理了我近期用 AI 参与完成的视频、游戏视觉、互动网页和电商工具尝试。可以先看一条精选样片，再往下翻完整作品。</p>
                <div class="hero-wordmark">playable archive</div>
                <div class="hero-actions">
                    <a class="hero-link primary" href="#featured-player">播放精选作品</a>
                    <a class="hero-link" href="#portfolio-grid">查看全部作品</a>
                </div>
            </div>
            <aside class="recruiter-panel" id="featured-player" aria-label="精选作品播放器">
                <div class="player-frame">
                    <video id="featured-video" playsinline controls controlsList="nodownload" preload="metadata"></video>
                    <button class="featured-play" id="featured-play" type="button">播放精选作品</button>
                </div>
                <div class="featured-copy">
                    <span class="section-label">First play</span>
                    <h2 id="featured-title">精选视频样片</h2>
                    <p id="featured-desc">正在加载最适合首屏展示的作品。</p>
                    <div class="featured-meta" id="featured-meta"></div>
                </div>
                <div class="signal-row">
                    <div class="signal">
                        <strong id="work-count">--</strong>
                        <span>works</span>
                    </div>
                    <div class="signal">
                        <strong id="category-count">--</strong>
                        <span>types</span>
                    </div>
                    <div class="signal">
                        <strong>AI</strong>
                        <span>made</span>
                    </div>
                </div>
            </aside>
        </header>

        <main>
            <section class="reel-section" aria-label="作品预览轨道">
                <div class="showreel-strip" id="showreel-strip"></div>
            </section>

            <div class="filters" id="filters">
                <button class="filter-btn active" data-filter="all">全部作品</button>
                <!-- Dynamic filters injected here -->
            </div>

            <div class="portfolio-container" id="portfolio-grid">
                <div class="status-card loading-shimmer">
                    <div>
                        <strong>Loading archive</strong>
                        <span>正在读取飞书同步的视频索引...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let videoData = [];
        let activeVideo = null;

        async function init() {
            try {
                // Fetch dynamic data generated by refresh.py
                const response = await fetch('./api/videos.json');
                if (!response.ok) throw new Error('Videos data not available');
                videoData = await response.json();

                // Sort by '序号'
                videoData.sort((a, b) => (a['序号'] || 0) - (b['序号'] || 0));

                // Extract unique categories (类型)
                const categories = new Set();
                videoData.forEach(item => {
                    const types = item['类型'];
                    if(types) {
                        if (Array.isArray(types)) {
                            types.forEach(cat => categories.add(cat));
                        } else if (typeof types === 'string') {
                            categories.add(types);
                        } else if (typeof types === 'object' && types.text) {
                            categories.add(types.text);
                        }
                    }
                });

                document.getElementById('work-count').textContent = videoData.length;
                document.getElementById('category-count').textContent = categories.size || 1;

                renderFeatured(videoData);
                renderShowreel(videoData);
                renderFilters(Array.from(categories));
                renderGallery(videoData);

            } catch (error) {
                console.error("Failed to load data:", error);
                renderStatus('Signal missing', '等待同步数据中... 请确保云端 Action 或本地 refresh 脚本运行一次。');
            }
        }

        function extractTags(itemField) {
            let tags = [];
            if (Array.isArray(itemField)) {
                tags = itemField.map(t => typeof t === 'object' ? t.text : t);
            } else if (typeof itemField === 'string' && itemField.trim()) {
                tags = [itemField.trim()];
            } else if (typeof itemField === 'object' && itemField !== null && itemField.text) {
                tags = [itemField.text];
            }
            return tags;
        }

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function renderStatus(title, message) {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = `
                <div class="status-card">
                    <div>
                        <strong>${escapeHTML(title)}</strong>
                        <span>${escapeHTML(message)}</span>
                    </div>
                </div>
            `;
        }

        function renderFilters(categories) {
            const filterContainer = document.getElementById('filters');
            filterContainer.innerHTML = '<button class="filter-btn active" data-filter="all">全部作品</button>'; // Reset
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = cat;
                btn.textContent = cat;
                filterContainer.appendChild(btn);
            });
            
            // Setup clicks
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const cat = e.target.dataset.filter;
                    filterGallery(cat);
                });
            });
        }

        function renderShowreel(items) {
            const strip = document.getElementById('showreel-strip');
            if (!strip) return;

            const withCovers = items.filter(item => item['封面URL'] || item['封面'] || item['Cover']);
            const featured = withCovers.filter(item => item['精选']);
            const latest = [...withCovers].sort((a, b) => (b['序号'] || 0) - (a['序号'] || 0));
            const reelItems = [...featured, ...latest]
                .filter((item, index, all) => all.findIndex(candidate => candidate['序号'] === item['序号']) === index)
                .slice(0, 12);

            strip.innerHTML = reelItems.map((item, index) => {
                const titleText = extractTags(item['内容'])[0] || item['内容'] || 'Untitled';
                const coverUrl = item['封面URL'] || item['封面'] || item['Cover'] || '';
                const seq = item['序号'] || index + 1;
                return `
                    <button class="reel-tile" type="button" data-work="${escapeHTML(seq)}" aria-label="查看 ${escapeHTML(titleText)}">
                        <img src="${escapeHTML(coverUrl)}" alt="${escapeHTML(titleText)}">
                        <b class="reel-index">${String(seq).padStart(2, '0')}</b>
                        <span>${escapeHTML(titleText)}</span>
                    </button>
                `;
            }).join('');

            strip.querySelectorAll('.reel-tile').forEach(tile => {
                tile.addEventListener('click', () => {
                    const seq = tile.dataset.work;
                    renderGallery(videoData);
                    document.querySelectorAll('.filter-btn').forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.filter === 'all');
                    });
                    window.setTimeout(() => {
                        const target = document.getElementById(`work-${seq}`);
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            target.classList.add('is-cued');
                            window.setTimeout(() => target.classList.remove('is-cued'), 900);
                        }
                    }, 40);
                });
            });
        }

        function renderFeatured(items) {
            const featuredVideo = document.getElementById('featured-video');
            const featuredPlay = document.getElementById('featured-play');
            const featuredTitle = document.getElementById('featured-title');
            const featuredDesc = document.getElementById('featured-desc');
            const featuredMeta = document.getElementById('featured-meta');
            const featuredItem = items.find(item => item['精选'] && item['URL']) || items.find(item => item['URL']) || items[0];

            if (!featuredItem || !featuredVideo) return;

            const titleText = extractTags(featuredItem['内容'])[0] || featuredItem['内容'] || '精选视频样片';
            const durationText = extractTags(featuredItem['时长']).join('') || featuredItem['时长'] || 'preview';
            const toolText = extractTags(featuredItem['AI工具']).join('') || featuredItem['AI工具'] || 'AI workflow';
            const descriptionText = extractTags(featuredItem['说明']).join('') || featuredItem['说明'] || '点击播放，快速查看作品动态效果。';
            const videoUrl = featuredItem['URL'] || featuredItem['视频URL'] || '';
            const coverUrl = featuredItem['封面URL'] || featuredItem['封面'] || featuredItem['Cover'] || '';
            const typeText = extractTags(featuredItem['类型']).join(' / ') || 'AI video';

            featuredTitle.textContent = titleText;
            featuredDesc.textContent = descriptionText;
            featuredMeta.innerHTML = `
                <span>${escapeHTML(durationText)}</span>
                <span>${escapeHTML(typeText)}</span>
                <span>${escapeHTML(toolText)}</span>
            `;

            if (coverUrl) {
                featuredVideo.poster = coverUrl;
            }
            if (videoUrl) {
                featuredVideo.src = videoUrl + '#t=0.001';
            } else {
                featuredVideo.removeAttribute('controls');
                featuredPlay.textContent = '查看作品截图';
            }

            if (featuredPlay && videoUrl) {
                featuredPlay.addEventListener('click', () => {
                    featuredVideo.play();
                });
                featuredVideo.addEventListener('play', () => {
                    featuredPlay.classList.add('is-hidden');
                });
                featuredVideo.addEventListener('pause', () => {
                    featuredPlay.classList.remove('is-hidden');
                });
            }
        }

        function filterGallery(category) {
            if (category === 'all') {
                renderGallery(videoData);
                return;
            }
            const filtered = videoData.filter(item => {
                const tags = extractTags(item['类型']);
                return tags.includes(category);
            });
            renderGallery(filtered);
        }

        function renderGallery(items) {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = '';

            if (!items.length) {
                renderStatus('No works here', '这个筛选下暂时没有作品。换一个类型看看。');
                return;
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.style.animationDelay = `${Math.min(0.42, index * 0.045)}s`;
                
                // Build Tags HTML
                let tagsHtml = '';
                const types = extractTags(item['类型']);
                types.forEach(cat => {
                    tagsHtml += `<span class="tag">${escapeHTML(cat)}</span>`;
                });
                
                const aiToolText = extractTags(item['AI工具']).join('');
                const aiToolHtml = aiToolText ? `<span class="tag tool-tag">${escapeHTML(aiToolText)}</span>` : '';
                
                const titleText = extractTags(item['内容'])[0] || item['内容'] || 'Untitled';
                const durationText = extractTags(item['时长']).join('') || item['时长'] || '';
                const videoUrl = item['URL'] || item['视频URL'] || '';
                const coverUrl = item['封面URL'] || item['封面'] || item['Cover'] || '';
                const descriptionText = extractTags(item['说明']).join('') || item['说明'] || '';
                const hasVideo = Boolean(videoUrl);
                card.className = `video-card${hasVideo ? '' : ' image-only'}`;
                card.id = `work-${item['序号'] || index + 1}`;
                const mediaHtml = hasVideo
                    ? `<video loop playsinline controlsList="nodownload" preload="metadata"${coverUrl ? ` poster="${escapeHTML(coverUrl)}"` : ''}></video>`
                    : `<img class="cover-image" src="${escapeHTML(coverUrl)}" alt="${escapeHTML(titleText)}">`;

                card.innerHTML = `
                    <div class="video-wrapper">
                        ${mediaHtml}
                        <div class="card-number">${String(item['序号'] || index + 1).padStart(2, '0')}</div>
                        <div class="click-catcher"></div>
                        <div class="play-indicator"></div>
                        <button class="fullscreen-btn" aria-label="全屏播放" title="全屏观看">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                        </button>
                        <div class="media-status">${hasVideo ? 'motion sample' : 'case preview'}</div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${escapeHTML(titleText)}</h3>
                        <div class="metadata">
                            <span>${escapeHTML(durationText || 'preview')}</span>
                        </div>
                        <div class="tags-container">
                            ${tagsHtml}
                            ${aiToolHtml}
                        </div>
                        ${descriptionText ? `<p class="card-desc">${escapeHTML(descriptionText)}</p>` : ''}
                    </div>
                `;

                const video = card.querySelector('video');
                const fsBtn = card.querySelector('.fullscreen-btn');
                
                if (!hasVideo || !video) {
                    grid.appendChild(card);
                    return;
                }

                if (videoUrl) {
                    video.src = videoUrl + '#t=0.001';
                }

                // 监听原生 play / pause 事件，以保证任何途径触发的播放暂停都能同步 UI 状态
                video.addEventListener('play', () => {
                    if (activeVideo && activeVideo !== video) {
                        activeVideo.pause(); // 将触发该前视频的 pause 事件，自动移除 playing 类
                    }
                    card.classList.add('playing');
                    activeVideo = video;
                });

                video.addEventListener('pause', () => {
                    card.classList.remove('playing');
                    if (activeVideo === video) {
                        activeVideo = null;
                    }
                });

                // 卡片点击切换播放/暂停
                card.addEventListener('click', () => {
                    if (!video.src) return;
                    if (video.paused) {
                        video.play();
                    } else {
                        video.pause();
                    }
                });

                // 全屏透明点击层：点击画面区域暂停/播放
                const catcher = card.querySelector('.click-catcher');
                catcher.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!video.src) return;
                    if (video.paused) {
                        video.play();
                    } else {
                        video.pause();
                    }
                });

                // 全屏按钮：进入全屏或退出全屏
                fsBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!video.src) return;

                    const fsElement = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;

                    if (fsElement) {
                        // 退出全屏
                        if (document.exitFullscreen) {
                            document.exitFullscreen();
                        } else if (document.webkitExitFullscreen) {
                            document.webkitExitFullscreen();
                        } else if (document.msExitFullscreen) {
                            document.msExitFullscreen();
                        }
                    } else {
                        // 进入全屏
                        if (video.paused) {
                            video.play();
                        }
                        const wrapper = card.querySelector('.video-wrapper');
                        if (wrapper.requestFullscreen) {
                            wrapper.requestFullscreen();
                        } else if (wrapper.webkitRequestFullscreen) {
                            wrapper.webkitRequestFullscreen();
                        } else if (wrapper.msRequestFullscreen) {
                            wrapper.msRequestFullscreen();
                        }
                    }
                });

                grid.appendChild(card);
            });
        }

        // 全屏状态变化时动态切换原生 controls
        let _exitingNativeFs = false; // 标志位：正在逐层退出全屏

        function handleFullscreenChange() {
            const fsElement = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
            
            // 移除所有视频的 controls
            document.querySelectorAll('video').forEach(v => {
                v.removeAttribute('controls');
            });

            // 情况1: video 元素自己进入了全屏（用户点了原生全屏按钮）
            // 设置标志位，先退出 video 的全屏
            if (fsElement && fsElement.tagName === 'VIDEO') {
                _exitingNativeFs = true;
                document.exitFullscreen();
                return;
            }

            // 情况2: video 全屏已退出，但 wrapper 全屏还在，继续退出
            if (_exitingNativeFs && fsElement && fsElement.classList.contains('video-wrapper')) {
                _exitingNativeFs = false;
                document.exitFullscreen();
                return;
            }

            // 清除标志位
            _exitingNativeFs = false;

            // 正常情况: wrapper 全屏时，给 video 加上 controls
            if (fsElement && fsElement.classList.contains('video-wrapper')) {
                const video = fsElement.querySelector('video');
                if (video) {
                    video.setAttribute('controls', 'true');
                }
            }
        }
        
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('msfullscreenchange', handleFullscreenChange);

        // Run
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视频作品集 | 岳影空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Aesop inspired warm, earthy palette */
            --bg-color: #F9F7F3;
            --text-primary: #2C2A28;
            --text-secondary: #5C5855;
            --accent-color: #A38C75;
            --tag-bg: #EAE5DE;
            --card-bg: #FFFFFF;
            
            --font-serif: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 2rem;
            --spacing-xl: 4rem;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: 400;
        }

        header {
            padding: var(--spacing-xl) var(--spacing-lg) var(--spacing-lg);
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 0.05em;
            margin-bottom: var(--spacing-md);
        }

        header p {
            font-family: var(--font-serif);
            color: var(--text-secondary);
            font-style: italic;
            font-size: 1.1rem;
        }

        /* Filter Tabs */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            padding: 0 var(--spacing-lg);
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--text-primary);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        /* Masonry Layout */
        .portfolio-container {
            column-count: 4;
            column-gap: var(--spacing-md);
            padding: 0 var(--spacing-lg) var(--spacing-xl);
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1200px) {
            .portfolio-container { column-count: 3; }
        }
        @media (max-width: 900px) {
            .portfolio-container { column-count: 2; }
        }
        @media (max-width: 600px) {
            .portfolio-container { column-count: 1; }
        }

        /* Video Card */
        .video-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            break-inside: avoid;
            margin-bottom: var(--spacing-md);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background-color: #EAE5DE;
            aspect-ratio: 9/16; /* Default for mobile vids, could be dynamic */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .play-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background-color: rgba(255,255,255,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .video-card:hover .play-indicator {
            opacity: 1;
        }
        
        .video-card.playing .play-indicator {
            opacity: 0;
        }

        .play-indicator::after {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent var(--text-primary);
            margin-left: 4px;
        }

        .card-content {
            padding: var(--spacing-md);
        }

        .card-title {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            margin: 0 0 var(--spacing-sm);
        }

        .metadata {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background-color: var(--tag-bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-primary);
        }
        
        .loading-shimmer {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(to right, #EAE5DE 4%, #F2EFEA 25%, #EAE5DE 36%);
            background-size: 1000px 100%;
        }
        
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

    </style>
</head>
<body>

    <header>
        <h1>SELECTED WORKS</h1>
        <p>A curated collection of visual storytelling</p>
    </header>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">全部 (All)</button>
        <!-- Dynamic filters injected here -->
    </div>

    <div class="portfolio-container" id="portfolio-grid">
        <!-- Videos injected here -->
    </div>

    <script>
        let videoData = [];
        let activeVideo = null;

        async function init() {
            try {
                // Fetch dynamic data generated by refresh.py
                const response = await fetch('./api/videos.json');
                if (!response.ok) throw new Error('Videos data not available');
                videoData = await response.json();

                // Sort by '序号'
                videoData.sort((a, b) => (a['序号'] || 0) - (b['序号'] || 0));

                // Extract unique categories (类型)
                const categories = new Set();
                videoData.forEach(item => {
                    const types = item['类型'];
                    if(types) {
                        if (Array.isArray(types)) {
                            types.forEach(cat => categories.add(cat));
                        } else if (typeof types === 'string') {
                            categories.add(types);
                        } else if (typeof types === 'object' && types.text) {
                            categories.add(types.text);
                        }
                    }
                });

                renderFilters(Array.from(categories));
                renderGallery(videoData);

            } catch (error) {
                console.error("Failed to load data:", error);
                const grid = document.getElementById('portfolio-grid');
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; margin-top:20px; color:var(--text-secondary);">等待同步数据中... 请确保云端 Action 或本地 refresh 脚本运行一次。</div>';
            }
        }

        function extractTags(itemField) {
            let tags = [];
            if (Array.isArray(itemField)) {
                tags = itemField.map(t => typeof t === 'object' ? t.text : t);
            } else if (typeof itemField === 'string' && itemField.trim()) {
                tags = [itemField.trim()];
            } else if (typeof itemField === 'object' && itemField !== null && itemField.text) {
                tags = [itemField.text];
            }
            return tags;
        }

        function renderFilters(categories) {
            const filterContainer = document.getElementById('filters');
            filterContainer.innerHTML = '<button class="filter-btn active" data-filter="all">全部 (All)</button>'; // Reset
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = cat;
                btn.textContent = cat;
                filterContainer.appendChild(btn);
            });
            
            // Setup clicks
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const cat = e.target.dataset.filter;
                    filterGallery(cat);
                });
            });
        }

        function filterGallery(category) {
            if (category === 'all') {
                renderGallery(videoData);
                return;
            }
            const filtered = videoData.filter(item => {
                const tags = extractTags(item['类型']);
                return tags.includes(category);
            });
            renderGallery(filtered);
        }

        function renderGallery(items) {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'video-card masonry-item';
                
                // Build Tags HTML
                let tagsHtml = '';
                const types = extractTags(item['类型']);
                types.forEach(cat => {
                    tagsHtml += `<span class="tag">${cat}</span>`;
                });
                
                const aiToolText = extractTags(item['AI工具']).join('');
                const aiToolHtml = aiToolText ? `<span class="tag" style="background:#5C5855;color:#fff;">${aiToolText}</span>` : '';
                
                const titleText = extractTags(item['内容'])[0] || item['内容'] || 'Untitled';
                const durationText = extractTags(item['时长']).join('') || item['时长'] || '';

                // We no longer need shimmer because the URL is already here
                card.innerHTML = `
                    <div class="video-wrapper">
                        <!-- Video element -->
                        <video loop playsinline controlsList="nodownload" preload="metadata"></video>
                        <div class="play-indicator"></div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${titleText}</h3>
                        <div class="metadata">
                            <span>${durationText}</span>
                        </div>
                        <div class="tags-container">
                            ${tagsHtml}
                            ${aiToolHtml}
                        </div>
                    </div>
                `;

                // Set src instantly with metadata frame hack
                const video = card.querySelector('video');
                if (item['URL']) {
                    video.src = item['URL'] + '#t=0.001';
                }

                // Handle playback
                card.addEventListener('click', () => {
                    if (!video.src) return;
                    
                    if (video.paused) {
                        // Pause others
                        if (activeVideo && activeVideo !== video) {
                            activeVideo.pause();
                            activeVideo.closest('.video-card').classList.remove('playing');
                        }
                        video.play();
                        card.classList.add('playing');
                        activeVideo = video;
                    } else {
                        video.pause();
                        card.classList.remove('playing');
                        activeVideo = null;
                    }
                });

                grid.appendChild(card);
            });
        }

        // Run
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

name: Auto Refresh Feishu Videos

on:
  schedule:
    # 每天 UTC 时间 16:00 运行（对应北京时间每天凌晨 00:00）
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行！

jobs:
  refresh-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 Action 提交代码给仓库

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Refresh Script
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_TOKEN: ${{ secrets.LARK_BASE_TOKEN }}
          LARK_TABLE_ID: ${{ secrets.LARK_TABLE_ID }}
        run: |
          python refresh.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/videos.json
          # 如果文件有变更，则提交并推送到仓库
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto refresh feishu videos" && git push)
